<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GAVOILLE MIROIR</title>
    <style>
        :root { --red: #E20613; --black: #1A1A18; --white: #FFFFFF; }
        
        /* Gestion de l'affichage plein écran pour éviter les menus mobiles */
        body { 
            margin: 0; background: var(--black); color: white; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; height: -webkit-fill-available;
            display: flex; flex-direction: column; overflow: hidden; 
        }
        
        header { 
            padding: 10px; background: white; text-align: center; 
            border-bottom: 3px solid var(--red); flex-shrink: 0; 
            z-index: 10;
        }
        
        .gavoille-logo-square { 
            display: inline-flex; background: var(--red); color: white; 
            width: 80px; height: 80px; border: 2px solid #000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .logo-text-main { font-size: 0.8rem; font-weight: 800; }
        .logo-text-sub { font-size: 0.6rem; padding-left: 10px; }

        .main-container { 
            flex: 1; display: flex; flex-direction: row; 
            padding: 10px; gap: 10px; overflow: hidden;
            padding-bottom: 100px; /* Espace pour les boutons flottants */
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .side-gallery { 
                flex: 0.5 !important; 
                grid-template-columns: repeat(4, 1fr) !important; 
                grid-template-rows: 1fr !important; 
            }
        }

        .mirror-view { flex: 2; position: relative; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #444; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .side-gallery { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; }
        .slot { background: #222; border-radius: 10px; border: 2px solid transparent; overflow: hidden; position: relative; aspect-ratio: 3/4; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot.active { border-color: var(--red); }

        /* BARRE DE CONTRÔLES FLOTTANTE (Solution pour Android/iPhone) */
        .floating-controls { 
            position: fixed; 
            bottom: 25px; /* Décollé du bas pour éviter les menus */
            left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .shutter { 
            width: 65px; height: 65px; background: var(--red); 
            border-radius: 50%; border: 4px solid white; cursor: pointer; 
            box-shadow: 0 0 0 2px var(--red);
        }
        
        .btn-ui { background: var(--black); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .btn-reset { background: transparent; color: #666; font-size: 0.7rem; text-decoration: underline; }

        #flash { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index: 5; }
    </style>
</head>
<body>

<header>
    <div class="gavoille-logo-square">
        <div class="logo-text-main">GAVOILLE</div>
        <div class="logo-text-sub">Opticiens</div>
    </div>
    <div style="color:#666; font-size:0.5rem; letter-spacing:3px; text-transform:uppercase; margin-top:5px;">Jassans Riottier</div>
</header>

<div class="main-container">
    <div class="mirror-view">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash"></div>
    </div>
    <div class="side-gallery">
        <div class="slot active" id="s1"></div>
        <div class="slot" id="s2"></div>
        <div class="slot" id="s3"></div>
        <div class="slot" id="s4"></div>
    </div>
</div>

<div class="floating-controls">
    <button class="btn-ui btn-reset" onclick="location.reload()">Reset</button>
    <button class="shutter" onclick="capture()"></button>
    <button class="btn-ui" onclick="shareViralWithPoll()">PARTAGER</button>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    let currentSlot = 1;
    let images = [null, null, null, null];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => video.srcObject = s)
        .catch(err => alert("Erreur caméra : " + err));

    function capture() {
        const flash = document.getElementById('flash');
        flash.style.opacity = 1; setTimeout(() => flash.style.opacity = 0, 100);

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.filter = 'brightness(1.05) contrast(1.1)';
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        const data = canvas.toDataURL('image/jpeg', 0.8);
        images[currentSlot-1] = data;
        
        document.getElementById('s'+currentSlot).innerHTML = `<img src="${data}">`;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        
        currentSlot = (currentSlot % 4) + 1;
        document.getElementById('s'+currentSlot).classList.add('active');
    }

    async function shareViralWithPoll() {
        if(!images[0]) return;
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1080; canvas.height = 1920;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,1080,1920);

        // Logo Carré sur l'image finale
        const logoSize = 250;
        ctx.fillStyle = "#E20613"; ctx.fillRect(415, 80, logoSize, logoSize);
        ctx.strokeStyle = "black"; ctx.lineWidth = 4; ctx.strokeRect(413, 78, logoSize+4, logoSize+4);
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 45px Arial";
        ctx.fillText("GAVOILLE", 540, 190); ctx.font = "30px Arial"; ctx.fillText("Opticiens", 585, 230);
        
        ctx.fillStyle = "#1A1A18"; ctx.font = "bold 55px Montserrat"; ctx.fillText("Aidez-moi à choisir !", 540, 460);

        const pos = [[40, 520], [560, 520], [40, 1190], [560, 1190]];
        for(let i=0; i<4; i++) {
            if(images[i]) {
                const img = await new Promise(res => { const o = new Image(); o.onload = () => res(o); o.src = images[i]; });
                ctx.drawImage(img, pos[i][0], pos[i][1], 480, 640);
                ctx.strokeStyle = "#E20613"; ctx.lineWidth = 10; ctx.strokeRect(pos[i][0], pos[i][1], 480, 640);
                ctx.fillStyle = "#E20613"; ctx.fillRect(pos[i][0], pos[i][1], 70, 70);
                ctx.fillStyle = "white"; ctx.font = "bold 45px Arial"; ctx.fillText(i+1, pos[i][0]+35, pos[i][1]+50);
            }
        }

        ctx.fillStyle = "#1A1A18"; ctx.fillRect(0, 1820, 1080, 100);
        ctx.fillStyle = "white"; ctx.font = "bold 35px Montserrat";
        ctx.fillText("TAGUEZ @GAVOILLE_OPTICIENS_JASSANS", 540, 1885);

        canvas.toBlob(async (blob) => {
            const file = new File([blob], "mon-choix.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file] });
            } else {
                window.open(canvas.toDataURL());
            }
        }, 'image/jpeg');
    }
</script>
</body>
</html>
