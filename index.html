<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GAVOILLE MIRROR DIRECT SHARE</title>
    <style>
        :root { --red: #E60000; --black: #0b0b0b; --ui: #1c1c1e; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Helvetica', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 800; letter-spacing: 4px; font-size: 1.2rem; text-transform: uppercase; }

        .main-container { flex: 1; display: flex; padding: 10px; gap: 10px; }
        
        .mirror-view { flex: 2; position: relative; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .side-gallery { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; }
        .slot { background: var(--ui); border-radius: 10px; border: 2px solid #333; overflow: hidden; position: relative; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot.active { border-color: var(--red); }
        .slot::after { content: attr(data-label); position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }

        .controls { padding: 20px; display: flex; justify-content: center; align-items: center; gap: 40px; background: #111; }
        .shutter { width: 75px; height: 75px; background: white; border-radius: 50%; border: 5px solid var(--red); cursor: pointer; }
        .share-btn { background: var(--red); color: white; border: none; padding: 15px 35px; border-radius: 30px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        #flash { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; }
    </style>
</head>
<body>

<header><div class="logo">GAVOILLE <span style="color:var(--red)">Opticiens</span></div></header>

<div class="main-container">
    <div class="mirror-view">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash"></div>
    </div>
    <div class="side-gallery">
        <div class="slot active" id="s1" data-label="1"></div>
        <div class="slot" id="s2" data-label="2"></div>
        <div class="slot" id="s3" data-label="3"></div>
        <div class="slot" id="s4" data-label="4"></div>
    </div>
</div>

<div class="controls">
    <button onclick="location.reload()" style="background:none; border:none; color:#555; text-decoration:underline;">Reset</button>
    <button class="shutter" onclick="capture()"></button>
    <button class="share-btn" onclick="shareDirect()">PARTAGER LE KIT</button>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    let currentSlot = 1;
    let images = [null, null, null, null];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    function capture() {
        const flash = document.getElementById('flash');
        flash.style.opacity = 1; setTimeout(() => flash.style.opacity = 0, 100);

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        const data = canvas.toDataURL('image/jpeg', 0.8);
        images[currentSlot-1] = data;
        
        document.getElementById('s'+currentSlot).innerHTML = `<img src="${data}">`;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        
        currentSlot = (currentSlot % 4) + 1;
        document.getElementById('s'+currentSlot).classList.add('active');
    }

    async function shareDirect() {
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1080; canvas.height = 1600;

        // Background & Bandeau
        ctx.fillStyle = "black"; ctx.fillRect(0,0,1080,1600);
        ctx.fillStyle = "white"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
        ctx.fillText("GAVOILLE OPTICIENS", 540, 100);
        ctx.fillStyle = "#E60000"; ctx.font = "35px Arial";
        ctx.fillText("Aidez-moi à choisir ma monture !", 540, 160);

        // Grille de 4
        const w = 480; const h = 600;
        const positions = [[40, 220], [560, 220], [40, 860], [560, 860]];

        for(let i=0; i<4; i++) {
            if(images[i]) {
                const img = await loadImage(images[i]);
                ctx.drawImage(img, positions[i][0], positions[i][1], w, h);
                ctx.strokeStyle = "#E60000"; ctx.lineWidth = 5;
                ctx.strokeRect(positions[i][0], positions[i][1], w, h);
            }
        }

        // Conversion en fichier pour le partage iOS
        canvas.toBlob(async (blob) => {
            const file = new File([blob], "mon-look-gavoille.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Mon look Gavoille Opticiens',
                        text: 'Quelle monture me va le mieux ?'
                    });
                } catch (err) {
                    console.log("Partage annulé ou erreur");
                }
            } else {
                alert("Le partage direct n'est pas supporté sur ce navigateur. Utilisez Safari sur iPad.");
            }
        }, 'image/jpeg');
    }

    function loadImage(src) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.src = src;
        });
    }
</script>
</body>
</html>
