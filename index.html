<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GAVOILLE - Kit Partage Story</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --red: #E60000; --black: #000; --grey: #1c1c1e; --text: white; }
        body { margin: 0; background: var(--black); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid #222; font-weight: 800; letter-spacing: 3px; font-size: 1.1rem; }
        
        .main-layout { flex: 1; display: flex; padding: 10px; gap: 10px; overflow: hidden; }
        
        /* Côté Miroir */
        .mirror-section { flex: 2; position: relative; border-radius: 15px; overflow: hidden; background: #111; border: 2px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Côté Galerie 4 Slots */
        .gallery-section { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; }
        .slot { background: var(--grey); border-radius: 10px; border: 2px solid #333; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot.active { border-color: var(--red); }
        .slot-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        /* Footer & Commandes */
        .controls { padding: 20px; display: flex; justify-content: center; align-items: center; gap: 30px; background: rgba(0,0,0,0.8); }
        .btn { border: none; border-radius: 30px; padding: 12px 24px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .shutter { width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid var(--red); }
        .share-btn { background: var(--red); color: white; }
        .reset-btn { background: none; color: #888; text-decoration: underline; }

        /* Modal Partage */
        #shareModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 25px; border-radius: 20px; display: none; text-align: center; z-index: 100; max-width: 90%; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        #flash { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; }
    </style>
</head>
<body>

<header>GAVOILLE <span style="color:var(--red)">OPTICIENS</span></header>

<div class="main-layout">
    <div class="mirror-section">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash"></div>
    </div>

    <div class="gallery-section">
        <div class="slot active" id="s1"><span class="slot-label">1</span></div>
        <div class="slot" id="s2"><span class="slot-label">2</span></div>
        <div class="slot" id="s3"><span class="slot-label">3</span></div>
        <div class="slot" id="s4"><span class="slot-label">4</span></div>
    </div>
</div>

<div class="controls">
    <button class="btn reset-btn" onclick="location.reload()">Reset</button>
    <button class="shutter" onclick="capture()"></button>
    <button class="btn share-btn" onclick="generateShareKit()">GÉNÉRER MON KIT DE VOTE</button>
</div>

<div id="shareModal">
    <h3 style="margin-top:0">Votre kit Story est prêt !</h3>
    <p style="font-size:0.9rem; color:#444">Scannez ce code pour partager vos 4 choix sur Instagram et demander l'avis de vos proches.</p>
    <div id="qrcode"></div>
    <button onclick="closeShare()" style="background:none; border:none; text-decoration:underline; font-size:0.8rem; color:#888;">Fermer</button>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const container = document.getElementById('mainMirror');
    let currentSlot = 1;
    let slotImages = [null, null, null, null]; // Stockage des 4 images

    // Camera Init
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    function capture() {
        if(currentSlot > 4) currentSlot = 1; // On boucle

        // Flash
        const f = document.getElementById('flash');
        f.style.opacity = 1; setTimeout(() => f.style.opacity = 0, 100);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1); // Effet miroir
        ctx.drawImage(video, 0, 0);
        
        const data = canvas.toDataURL('image/jpeg', 0.8);
        slotImages[currentSlot-1] = data; // Stockage
        
        // Affichage galerie
        const target = document.getElementById('s'+currentSlot);
        target.innerHTML = `<span class="slot-label">${currentSlot}</span><img src="${data}">`;
        
        // Update slots
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        currentSlot++;
        if(currentSlot <= 4) document.getElementById('s'+currentSlot).classList.add('active');
    }

    // === CŒUR DU SYSTÈME : GÉNÉRATION DU KIT STORY GAVOILLE ===
    function generateShareKit() {
        if(slotImages.filter(img => img !== null).length < 2) { 
            alert("Prenez au moins 2 photos pour comparer !"); return; 
        }

        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        
        // Dimensions Story Instagram (1080x1920)
        canvas.width = 1080;
        canvas.height = 1920;
        
        // Fond
        ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // === BANDEAU PUBLICITAIRE GAVOILLE (HAUT) ===
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 60px Helvetica"; ctx.textAlign = "center";
        ctx.fillText("GAVOILLE OPTICIENS", canvas.width/2, 120);
        ctx.fillStyle = "#E60000"; ctx.font = "30px Helvetica";
        ctx.fillText("#NouveauLook #GavoilleMirror", canvas.width/2, 170);

        // === INVITATION AU VOTE (MILIEU) ===
        ctx.fillStyle = "#FFFFFF"; ctx.font = "italic 50px Georgia";
        ctx.fillText("Aidez-moi à choisir ma monture !", canvas.width/2, 260);

        // === GRILLE DE COMPARAISON 4 IMAGES ===
        const imgW = 500; const imgH = 667; const gap = 30;
        const startX = (canvas.width - (2*imgW + gap))/2;
        const startY = 320;
        
        const drawSlot = (idx, x, y) => {
            if(slotImages[idx]) {
                const img = new Image();
                img.src = slotImages[idx];
                img.onload = () => {
                    // Cadre Rouge Gavoille
                    ctx.strokeStyle = "#E60000"; ctx.lineWidth = 10;
                    ctx.strokeRect(x, y, imgW, imgH);
                    // Dessin image
                    ctx.drawImage(img, x, y, imgW, imgH);
                    // Numéro Slot
                    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 50px Arial"; ctx.textAlign = "left";
                    ctx.fillText(idx+1, x+20, y+60);
                };
            } else {
                ctx.fillStyle = "#222"; ctx.fillRect(x, y, imgW, imgH);
                ctx.fillStyle = "#666"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("Slot "+(idx+1), x+imgW/2, y+imgH/2);
            }
        };

        drawSlot(0, startX, startY); drawSlot(1, startX+imgW+gap, startY);
        drawSlot(2, startX, startY+imgH+gap); drawSlot(3, startX+imgW+gap, startY+imgH+gap);

        // === BANDEAU APPEL À L'ACTION (BAS) ===
        setTimeout(() => {
            ctx.fillStyle = "#E60000"; ctx.fillRect(0, canvas.height - 150, canvas.width, 150);
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 50px Helvetica"; ctx.textAlign = "center";
            ctx.fillText("Votez pour ma monture préférée !", canvas.width/2, canvas.height - 70);
            
            // Finalisation : Exportation et upload vers serveur
            const finalKitData = canvas.toDataURL('image/jpeg', 0.9);
            uploadAndShowQR(finalKitData);
        }, 500); // Laisse le temps aux images de charger
    }

    // === SIMULATION D'UPLOAD ET GÉNÉRATION QR ===
    function uploadAndShowQR(imageData) {
        document.getElementById('shareModal').style.display = 'block';
        document.getElementById('qrcode').innerHTML = "";
        
        // --- C'est ici qu'il faut le lien vers votre script serveur ---
        // Ex: const shareLink = await uploadToServer(imageData);
        const demoLink = "https://www.instagram.com/gavoilleopticiens/"; // Pour démo
        
        new QRCode(document.getElementById("qrcode"), {
            text: demoLink,
            width: 150, height: 150
        });
    }

    function closeShare() { document.getElementById('shareModal').style.display = 'none'; }
</script>

</body>
</html>
