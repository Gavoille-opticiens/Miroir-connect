<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GAVOILLE MIRROR V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --red: #E60000; --black: #0b0b0b; --ui: #1c1c1e; }
        body { margin: 0; background: var(--black); color: white; font-family: 'Helvetica', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 800; letter-spacing: 4px; font-size: 1.2rem; }

        /* Grille adaptative */
        .mirror-container { 
            flex: 1; position: relative; display: grid; gap: 10px; padding: 10px; 
            grid-template-columns: 1fr; grid-template-rows: 1fr; 
        }
        .mirror-container.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .view-slot { position: relative; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
        .view-slot video, .view-slot img { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .view-slot.active { border-color: var(--red); }

        /* Barre d'outils latérale ou basse */
        .toolbar { padding: 20px; background: #111; display: flex; justify-content: space-around; align-items: center; }
        
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
        .shutter { width: 80px; height: 80px; background: white; border: 5px solid var(--red); }
        .option-btn { background: var(--ui); color: white; border: 1px solid #444; }

        /* Modal Partage */
        #shareModal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: black; padding: 25px; border-radius: 20px;
            display: none; text-align: center; z-index: 100;
        }

        /* Filtres CSS */
        .filter-sepia { filter: sepia(1) scaleX(-1); }
        .filter-bw { filter: grayscale(1) scaleX(-1); }
        .filter-vif { filter: contrast(1.2) brightness(1.1) scaleX(-1); }
    </style>
</head>
<body>

<header><div class="logo">GAVOILLE <span style="color:var(--red)">OPTICIENS</span></div></header>

<div class="mirror-container" id="mainMirror">
    <div class="view-slot active" id="v1"><video id="video" autoplay playsinline muted></video></div>
</div>

<div class="toolbar">
    <button class="option-btn btn-circle" onclick="toggleGrid()">Grille</button>
    <button class="option-btn btn-circle" onclick="cycleFilter()">Filtre</button>
    <button class="shutter btn-circle" onclick="takePhoto()"></button>
    <button class="option-btn btn-circle" style="background:var(--red)" onclick="showShare()">Partager</button>
    <button class="option-btn btn-circle" onclick="location.reload()">Reset</button>
</div>

<div id="shareModal">
    <h3 style="margin-top:0">Votre photo Gavoille</h3>
    <div id="qrcode"></div>
    <p style="font-size:0.8rem; color:#666">Scannez pour Instagram</p>
    <button onclick="closeShare()" style="background:var(--red); color:white; border:none; padding:10px 20px; border-radius:10px;">Fermer</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const container = document.getElementById('mainMirror');
    let isGrid = false;
    let currentFilter = 'normal';
    let slotCount = 1;

    // Camera Init
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    function toggleGrid() {
        isGrid = !isGrid;
        if(isGrid) {
            container.classList.add('grid-4');
            for(let i=2; i<=4; i++) {
                let div = document.createElement('div');
                div.className = 'view-slot';
                div.id = 'v'+i;
                div.innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#333">Slot '+i+'</div>';
                container.appendChild(div);
            }
        } else {
            location.reload(); // Simple reset pour sortir du mode grille
        }
    }

    function cycleFilter() {
        const filters = ['normal', 'filter-bw', 'filter-sepia', 'filter-vif'];
        let idx = filters.indexOf(currentFilter);
        currentFilter = filters[(idx + 1) % filters.length];
        video.className = currentFilter === 'normal' ? '' : currentFilter;
    }

    function takePhoto() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Effet miroir + Filtre
        if(currentFilter === 'filter-bw') ctx.filter = 'grayscale(1)';
        if(currentFilter === 'filter-sepia') ctx.filter = 'sepia(1)';
        
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        const data = canvas.toDataURL('image/jpeg');
        if(slotCount <= 4) {
            const target = document.getElementById('v'+slotCount);
            target.innerHTML = `<img src="${data}" class="${currentFilter}">`;
            slotCount++;
        }
    }

    function showShare() {
        document.getElementById('shareModal').style.display = 'block';
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://www.instagram.com/gavoilleopticiens/",
            width: 150, height: 150
        });
    }

    function closeShare() { document.getElementById('shareModal').style.display = 'none'; }
</script>

</body>
</html>
