<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miroir Gavoille Opticiens</title>
    <style>
        :root {
            --gavoille-red: #e60000;
            --gavoille-black: #1a1a1a;
            --gavoille-wood: #d2b48c;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--gavoille-black);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        /* Le Miroir */
        .mirror-section {
            flex: 2;
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #333;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Effet miroir */
        }

        /* Galerie de comparaison */
        .gallery-section {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        .photo-slot {
            background: #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid transparent;
            position: relative;
        }

        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bouton Capture */
        .controls {
            padding: 30px;
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.5);
        }

        .capture-btn {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            border: 5px solid var(--gavoille-red);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .capture-btn:active {
            transform: scale(0.9);
            background: var(--gavoille-red);
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">GAVOILLE <span style="color:var(--gavoille-red)">Opticiens</span></div>
</header>

<div class="main-container">
    <div class="mirror-section">
        <video id="video" autoplay playsinline></video>
        <div class="instruction">Comparez vos montures ici</div>
    </div>

    <div class="gallery-section" id="gallery">
        <div class="photo-slot" id="slot-1"></div>
        <div class="photo-slot" id="slot-2"></div>
        <div class="photo-slot" id="slot-3"></div>
        <div class="photo-slot" id="slot-4"></div>
    </div>
</div>

<div class="controls">
    <button class="capture-btn" onclick="takeSnapshot()"></button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let slotIndex = 1;

    // Accès à la caméra frontale de l'iPad
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Erreur caméra: ", err);
        });

    function takeSnapshot() {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Dessiner la vidéo sur le canvas (en inversant pour garder l'effet miroir)
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/png');
        
        // Remplir les slots 1 à 4
        const currentSlot = document.getElementById(`slot-${slotIndex}`);
        currentSlot.innerHTML = `<img src="${imageData}">`;
        currentSlot.style.borderColor = "var(--gavoille-red)";
        
        slotIndex++;
        if(slotIndex > 4) slotIndex = 1; // On boucle
    }
</script>

</body>
</html>
