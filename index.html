<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GAVOILLE MIRROR - VIRAL V4</title>
    <style>
        :root { --red: #E20613; --black: #1A1A18; --grey: #F8F8F8; }
        
        body { 
            margin: 0; background: var(--black); color: white; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }
        
        header { padding: 15px; background: white; text-align: center; border-bottom: 3px solid var(--red); flex-shrink: 0; }

        .main-container { flex: 1; display: flex; flex-direction: row; padding: 15px; gap: 15px; overflow: hidden; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .mirror-view { flex: 2 !important; }
            .side-gallery { flex: 0.7 !important; grid-template-columns: repeat(4, 1fr) !important; grid-template-rows: 1fr !important; }
        }

        .mirror-view { flex: 2.5; position: relative; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #444; }
        #video { 
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); 
            filter: brightness(1.05) contrast(1.1);
        }

        .side-gallery { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; }
        .slot { background: #222; border-radius: 12px; border: 2px solid transparent; overflow: hidden; position: relative; aspect-ratio: 3/4; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot.active { border-color: var(--red); box-shadow: 0 0 15px rgba(226, 6, 19, 0.5); }

        .controls { padding: 20px; display: flex; justify-content: center; align-items: center; gap: 30px; background: white; flex-shrink: 0; }
        .shutter { width: 75px; height: 75px; background: var(--red); border-radius: 50%; border: 6px solid #f8d0d2; cursor: pointer; }
        .share-btn { 
            background: var(--black); color: white; border: none; padding: 15px 30px; 
            border-radius: 50px; font-weight: bold; font-size: 0.9rem; cursor: pointer; 
        }
        
        #flash { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--black); font-weight:900; letter-spacing:2px; font-size:1.6rem; line-height:1;">
        GAVOILLE OPTICIENS
    </div>
    <div style="color:#666; font-size:0.6rem; letter-spacing:4px; text-transform:uppercase; margin-top:5px;">Jassans Riottier</div>
</header>

<div class="main-container">
    <div class="mirror-view">
        <video id="video" autoplay playsinline muted></video>
        <div id="flash"></div>
    </div>
    <div class="side-gallery">
        <div class="slot active" id="s1"></div>
        <div class="slot" id="s2"></div>
        <div class="slot" id="s3"></div>
        <div class="slot" id="s4"></div>
    </div>
</div>

<div class="controls">
    <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline; font-size:0.8rem;">Reset</button>
    <button class="shutter" onclick="capture()"></button>
    <button class="share-btn" onclick="shareViral()">🚀 PARTAGER MA STORY</button>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    let currentSlot = 1;
    let images = [null, null, null, null];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    function capture() {
        const flash = document.getElementById('flash');
        flash.style.opacity = 1; setTimeout(() => flash.style.opacity = 0, 100);

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        ctx.filter = 'brightness(1.05) contrast(1.1)';
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        const data = canvas.toDataURL('image/jpeg', 0.8);
        images[currentSlot-1] = data;
        
        document.getElementById('s'+currentSlot).innerHTML = `<img src="${data}">`;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        
        currentSlot = (currentSlot % 4) + 1;
        document.getElementById('s'+currentSlot).classList.add('active');
    }

    async function shareViral() {
        if(!images[0]) { alert("Prenez au moins une photo !"); return; }
        
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1080; canvas.height = 1920;

        ctx.fillStyle = "white"; ctx.fillRect(0,0,1080,1920);

        // Titre Simplifié sur l'Export
        ctx.fillStyle = "#1A1A18"; ctx.font = "bold 80px Montserrat"; ctx.textAlign = "center";
        ctx.fillText("GAVOILLE", 540, 160);
        ctx.fillStyle = "#E20613"; ctx.fillText("OPTICIENS", 540, 245);
        
        // Sticker Instagram
        ctx.fillStyle = "#F4F4F4"; ctx.roundRect(300, 280, 480, 70, 35); ctx.fill();
        ctx.fillStyle = "#1A1A18"; ctx.font = "bold 35px Montserrat";
        ctx.fillText("📸 @gavoille_opticiens_jassans", 540, 328);

        ctx.fillStyle = "#1A1A18"; ctx.font = "italic 45px Georgia";
        ctx.fillText("Aidez-moi à choisir mes lunettes !", 540, 440);

        const w = 480; const h = 640;
        const pos = [[40, 520], [560, 520], [40, 1190], [560, 1190]];

        for(let i=0; i<4; i++) {
            if(images[i]) {
                const img = await new Promise(res => { const o = new Image(); o.onload = () => res(o); o.src = images[i]; });
                ctx.drawImage(img, pos[i][0], pos[i][1], w, h);
                ctx.strokeStyle = "#E20613"; ctx.lineWidth = 10; ctx.strokeRect(pos[i][0], pos[i][1], w, h);
                ctx.fillStyle = "#E20613"; ctx.fillRect(pos[i][0], pos[i][1], 70, 70);
                ctx.fillStyle = "white"; ctx.font = "bold 45px Arial"; ctx.fillText(i+1, pos[i][0]+35, pos[i][1]+50);
            }
        }

        ctx.fillStyle = "#1A1A18"; ctx.fillRect(0, 1820, 1080, 100);
        ctx.fillStyle = "white"; ctx.font = "bold 35px Montserrat";
        ctx.fillText("TAGUEZ @GAVOILLE_OPTICIENS_JASSANS EN STORY !", 540, 1885);

        canvas.toBlob(async (blob) => {
            const file = new File([blob], "choix-gavoille.jpg", { type: "image/jpeg" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Gavoille Opticiens' });
            } else {
                window.open(canvas.toDataURL());
            }
        }, 'image/jpeg');
    }

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
            this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
        };
    }
</script>
</body>
</html>
