<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GAVOILLE MIRROR</title>
    <style>
        :root {
            --red: #E60000;
            --black: #000000;
            --grey: #1c1c1e;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* En-tête */
        header {
            padding: 30px 0 10px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Zone Miroir Principale */
        .mirror-container {
            position: relative;
            flex: 1;
            margin: 0 15px;
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Effet Miroir */
        }

        /* Flash lors de la capture */
        #flash {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        /* Galerie en bas */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px 15px;
            height: 150px;
        }

        .slot {
            background: var(--grey);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .active-slot {
            border-color: var(--red) !important;
        }

        /* Bouton de commande */
        .controls {
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .shutter-btn {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            border: 4px solid var(--red);
            position: relative;
        }

        .shutter-btn:active {
            transform: scale(0.95);
            background: var(--red);
        }

        .reset-btn {
            color: #666;
            text-decoration: underline;
            font-size: 0.9rem;
            border: none;
            background: none;
        }
    </style>
</head>
<body>

<header>GAVOILLE <span style="color:var(--red)">OPTICIENS</span></header>

<div class="mirror-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="flash"></div>
</div>

<div class="gallery">
    <div class="slot active-slot" id="s1"></div>
    <div class="slot" id="s2"></div>
    <div class="slot" id="s3"></div>
    <div class="slot" id="s4"></div>
</div>

<div class="controls">
    <button class="shutter-btn" onclick="capture()"></button>
    <button class="reset-btn" onclick="location.reload()">Réinitialiser le miroir</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    let currentSlot = 1;

    // Lancement de la caméra optimisé pour iOS
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Erreur caméra : Vérifiez les autorisations dans les réglages de l'iPad.");
        }
    }

    function capture() {
        if (currentSlot > 4) return;

        // Effet flash
        const flash = document.getElementById('flash');
        flash.style.opacity = 1;
        setTimeout(() => flash.style.opacity = 0, 100);

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Dessin de l'image inversée (miroir)
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);

        const data = canvas.toDataURL('image/png');
        const slot = document.getElementById('s' + currentSlot);
        slot.innerHTML = `<img src="${data}">`;
        slot.classList.remove('active-slot');

        currentSlot++;
        if (currentSlot <= 4) {
            document.getElementById('s' + currentSlot).classList.add('active-slot');
        }
    }

    initCamera();
</script>

</body>
</html>
